[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "EVChargax"
version = "0.1.0"
description = "A project for EV charging analysis"
authors = [
    { name = "Your Name", email = "your.email@example.com" }
]
license = { text = "MIT" }
readme = "README.md"
homepage = "https://example.com/EVChargax"
repository = "https://github.com/yourusername/EVChargax"
keywords = ["EV", "charging", "analysis"]

[tool.setuptools]
packages = ["evchargax"]

[tool.setuptools.package-data]
evchargax = ["data/*.csv"]

[tool.setuptools.scripts]
evchargax-cli = "evchargax.cli:main"